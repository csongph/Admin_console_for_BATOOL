services:
  - type: web
    name: ba-tool-backend
    runtime: python
    rootDir: .                     # เริ่มทำงานจากโฟลเดอร์นอกสุดของโปรเจกต์
    buildCommand: pip install -r backend/requirements.txt  # ชี้เป้าไปที่ในโฟลเดอร์ backend ตรงๆ
    startCommand: uvicorn backend.app.main:app --host 0.0.0.0 --port $PORT  # สั่งรันโดยวิ่งผ่าน backend เข้าไปหา app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ba-tool-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "60"
      - key: ENVIRONMENT
        value: production
      - key: ADMIN_USERNAME
        value: "admin"
      - key: ADMIN_PASSWORD
        # เว้น value ไว้ เพื่อความปลอดภัย โดยคุณสามารถไปกรอกรหัสผ่านจริงได้ใน Render Dashboard

databases:
  - name: ba-tool-db
    databaseName: ba_tool
    user: ba_tool_user