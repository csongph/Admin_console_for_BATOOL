services:
  - type: web
    name: ba-tool-backend
    runtime: python
    rootDir: .

    buildCommand: |
      pip install --upgrade pip
      pip install -r backend/requirements.txt

    startCommand: uvicorn backend.app.main:app --host 0.0.0.0 --port $PORT

    envVars:
      - key: DATABASE_URL
      fromDatabase:
          name: ba-tool-db
          property: connectionString

      - key: SECRET_KEY
        generateValue: true

      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "60"

      - key: ENVIRONMENT
        value: production

      - key: ADMIN_USERNAME
        value: admin

      - key: ADMIN_PASSWORD
        sync: false

databases:
  - name: ba-tool-db
    databaseName: ba_tool
    user: ba_tool_user