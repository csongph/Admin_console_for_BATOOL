services:
  - type: web
    name: ba-tool-backend
    runtime: python
    rootDir: backend

    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt

    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT

    envVars:
      - key: DATABASE_URL
        sync: false  # กรอก Supabase connection string ใน Render Dashboard

      - key: SECRET_KEY
        generateValue: true

      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "60"

      - key: ENVIRONMENT
        value: production

      - key: ADMIN_USERNAME
        value: admin

      - key: ADMIN_PASSWORD
        sync: false

      - key: ALLOWED_ORIGINS
        value: http://localhost,http://localhost:3000,http://localhost:5173,http://localhost:5500,http://localhost:5501,http://127.0.0.1,http://127.0.0.1:5500,http://127.0.0.1:5501,null,https://ba-tool-for-multiple-db.vercel.app,https://admin-console-for-batool-91pz.vercel.app

      - key: ALLOWED_ORIGIN_REGEX
        value: https://admin-console-for-batool(-[a-z0-9]+)?\.vercel\.app
